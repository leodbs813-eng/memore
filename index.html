<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>메모RE</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}
.flip {
    transform: rotateY(180deg);
}
.card {
    transition: transform 0.4s;
    transform-style: preserve-3d;
}
</style>
</head>
<body class="bg-gray-100">

<div class="max-w-4xl mx-auto p-6">

    <h1 class="text-4xl font-bold mb-6">메모RE</h1>

    <div class="flex gap-3 mb-6">
        <input id="setName" class="border p-2 rounded w-full" placeholder="새 암기 세트 이름">
        <button onclick="addSet()" class="bg-black text-white px-4 py-2 rounded">
            추가
        </button>
    </div>

    <div id="setList" class="grid gap-4"></div>

    <div id="studyView" class="hidden mt-10">
        <button onclick="goHome()" class="mb-4 px-4 py-2 border rounded">
            뒤로가기
        </button>

        <h2 id="studyTitle" class="text-2xl font-bold mb-6"></h2>

        <div onclick="flipCard()" id="cardBox"
            class="bg-white rounded-xl shadow p-10 text-center text-2xl cursor-pointer min-h-[220px] flex items-center justify-center">
        </div>

        <div class="flex gap-3 mt-6">
            <button onclick="prevCard()" class="px-4 py-2 bg-gray-300 rounded">
                이전
            </button>
            <button onclick="nextCard()" class="px-4 py-2 bg-black text-white rounded">
                다음
            </button>
        </div>

        <div class="mt-6 flex gap-3">
            <input id="newCard" class="border p-2 rounded w-full" placeholder="카드 내용 추가">
            <button onclick="addCard()" class="bg-blue-500 text-white px-4 py-2 rounded">
                카드 추가
            </button>
        </div>
    </div>

</div>

<script>
let sets = JSON.parse(localStorage.getItem("memoSets")) || [];
let currentSet = null;
let currentIndex = 0;
let flipped = false;

function save() {
    localStorage.setItem("memoSets", JSON.stringify(sets));
}

function renderSets() {
    const list = document.getElementById("setList");
    list.innerHTML = "";

    sets.forEach((set, index) => {
        const div = document.createElement("div");
        div.className = "bg-white p-4 rounded-xl shadow";

        div.innerHTML = `
            <h2 class="text-2xl font-semibold">${set.name}</h2>
            <p class="text-gray-500">${set.cards.length}개 카드</p>
            <button onclick="startStudy(${index})"
                class="mt-3 bg-black text-white px-4 py-2 rounded">
                공부 시작
            </button>
        `;

        list.appendChild(div);
    });
}

function addSet() {
    const input = document.getElementById("setName");
    const name = input.value.trim();

    if (!name) return;

    sets.push({
        name,
        cards: []
    });

    input.value = "";
    save();
    renderSets();
}

function startStudy(index) {
    currentSet = sets[index];
    currentIndex = 0;
    flipped = false;

    document.getElementById("setList").classList.add("hidden");
    document.getElementById("studyView").classList.remove("hidden");
    document.getElementById("studyTitle").innerText = currentSet.name;

    renderCard();
}

function renderCard() {
    if (!currentSet.cards.length) {
        document.getElementById("cardBox").innerText = "카드 없음";
        return;
    }

    document.getElementById("cardBox").innerText =
        currentSet.cards[currentIndex];

    flipped = false;
}

function addCard() {
    const input = document.getElementById("newCard");
    const text = input.value.trim();

    if (!text || !currentSet) return;

    currentSet.cards.push(text);

    save();
    input.value = "";
    renderCard();
    renderSets();
}

function nextCard() {
    if (!currentSet || !currentSet.cards.length) return;

    currentIndex = (currentIndex + 1) % currentSet.cards.length;
    renderCard();
}

function prevCard() {
    if (!currentSet || !currentSet.cards.length) return;

    currentIndex =
        (currentIndex - 1 + currentSet.cards.length) %
        currentSet.cards.length;

    renderCard();
}

function flipCard() {
    const card = document.getElementById("cardBox");
    card.classList.toggle("flip");
}

function goHome() {
    document.getElementById("studyView").classList.add("hidden");
    document.getElementById("setList").classList.remove("hidden");
}

renderSets();
</script>

</body>
</html>
